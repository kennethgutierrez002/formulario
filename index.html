<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Formulario de Productos</title>

<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

</head>

<body class="w3-light-grey">

<div class="w3-container w3-blue">
<h2>Registro de Productos</h2>
</div>

<div class="w3-container w3-margin">

<input class="w3-input w3-border w3-margin-bottom" id="nombre" placeholder="Nombre">

<input class="w3-input w3-border w3-margin-bottom" id="precio" placeholder="Precio">

<input class="w3-input w3-border w3-margin-bottom" id="cantidad" placeholder="Cantidad">

<button class="w3-button w3-green" onclick="guardar()">
Guardar
</button>

</div>

<div class="w3-container">

<table class="w3-table-all" id="tabla">
<tr class="w3-blue">
<th>Nombre</th>
<th>Precio</th>
<th>Cantidad</th>
<th>Acciones</th>
</tr>
</table>

</div>

<script>

let filaEditar=null;

function guardar(){

let nombre=document.getElementById("nombre").value;
let precio=document.getElementById("precio").value;
let cantidad=document.getElementById("cantidad").value;

if(nombre==""||precio==""||cantidad==""){
alert("Complete todos los campos");
return;
}

if(filaEditar==null){

let tabla=document.getElementById("tabla");

let fila=tabla.insertRow();

fila.insertCell(0).innerHTML=nombre;
fila.insertCell(1).innerHTML=precio;
fila.insertCell(2).innerHTML=cantidad;
fila.insertCell(3).innerHTML=
'<button class="w3-button w3-yellow" onclick="editar(this)">Editar</button> '+
'<button class="w3-button w3-red" onclick="eliminar(this)">Eliminar</button>';

}else{

filaEditar.cells[0].innerHTML=nombre;
filaEditar.cells[1].innerHTML=precio;
filaEditar.cells[2].innerHTML=cantidad;

filaEditar=null;

}

document.getElementById("nombre").value="";
document.getElementById("precio").value="";
document.getElementById("cantidad").value="";

}

function eliminar(boton){

let fila=boton.parentNode.parentNode;
fila.remove();

}

function editar(boton){

filaEditar=boton.parentNode.parentNode;

document.getElementById("nombre").value=filaEditar.cells[0].innerHTML;
document.getElementById("precio").value=filaEditar.cells[1].innerHTML;
document.getElementById("cantidad").value=filaEditar.cells[2].innerHTML;

}

</script>

</body>
</html>
